name: Buscar imóveis

on:
  schedule:
    # Roda a cada 12 horas. Horário em UTC (Brasil = UTC-3).
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Garante que só uma execução roda por vez
concurrency:
  group: buscar-imoveis
  cancel-in-progress: false

jobs:
  buscar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sincronizar com o main
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Rodar a busca
        env:
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: node scripts/buscar.mjs

      - name: Salvar resultado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add imoveis.json

          if ! git diff --staged --quiet; then
            git commit -m "Atualiza imoveis.json [automático]"
            git push
          else
            echo "Nada mudou em imoveis.json, nada para salvar."
          fi
