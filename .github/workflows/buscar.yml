name: Buscar imóveis

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:
    inputs:
      chave_adicional:
        description: 'Chave ScrapingBee extra (opcional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rodar a busca
        env:
          # ScrapingBee
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          SCRAPINGBEE_API_KEY_2: ${{ secrets.SCRAPINGBEE_API_KEY_2 }}
          SCRAPINGBEE_API_KEY_3: ${{ secrets.SCRAPINGBEE_API_KEY_3 }}
          SCRAPINGBEE_API_KEY_4: ${{ secrets.SCRAPINGBEE_API_KEY_4 }}
          SCRAPINGBEE_API_KEY_5: ${{ secrets.SCRAPINGBEE_API_KEY_5 }}
          # Firecrawl
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # ScraperAPI
          SCRAPERAPI_API_KEY: ${{ secrets.SCRAPERAPI_API_KEY }}
        run: node scripts/buscar.mjs

      - name: Salvar resultado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imoveis.json historico/
          if ! git diff --staged --quiet; then
            git commit -m "Atualiza imoveis.json [automático]"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Conflito durante o rebase - mantendo a versão recém-coletada."
              git checkout --ours -- imoveis.json
              git add imoveis.json
              git rebase --continue
            fi
            git push
          else
            echo "Nada mudou em imoveis.json, nada para salvar."
          fi
