name: Buscar imóveis

on:
  schedule:
    # Roda a cada 48 horas de verdade (campo de DIA, nao de hora - o campo de
    # hora so vai de 0 a 23, entao "*/48" nesse campo nao funciona como
    # 48 horas, na pratica vira "todo dia"). Meia-noite UTC = 21h em Brasília.
    - cron: "0 0 */2 * *"
  workflow_dispatch: {}
    # Isso permite rodar manualmente: no GitHub, aba "Actions" > "Buscar imóveis" > "Run workflow"

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rodar a busca
        env:
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          SCRAPINGBEE_API_KEY_2: ${{ secrets.SCRAPINGBEE_API_KEY_2 }}
          SCRAPINGBEE_API_KEY_3: ${{ secrets.SCRAPINGBEE_API_KEY_3 }}
          SCRAPINGBEE_API_KEY_4: ${{ secrets.SCRAPINGBEE_API_KEY_4 }}
          SCRAPINGBEE_API_KEY_5: ${{ secrets.SCRAPINGBEE_API_KEY_5 }}
        run: node scripts/buscar.mjs

      - name: Salvar resultado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imoveis.json historico/
          if ! git diff --staged --quiet; then
            git commit -m "Atualiza imoveis.json [automático]"
            git fetch origin main
            if ! git rebase origin/main; then
              # imoveis.json é gerado automaticamente (ninguém edita à mão),
              # então em caso de conflito é seguro manter a versão que
              # acabou de ser coletada nesta execução.
              echo "Conflito durante o rebase - mantendo a versão recém-coletada."
              git checkout --ours -- imoveis.json
              git add imoveis.json
              git rebase --continue
            fi
            git push
          else
            echo "Nada mudou em imoveis.json, nada para salvar."
          fi
