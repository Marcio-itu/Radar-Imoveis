name: Buscar imóveis

on:
  schedule:
    # Roda a cada 6 horas. Horário em UTC (Brasil = UTC-3, sem horário de verão).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
    # Isso permite rodar manualmente: no GitHub, aba "Actions" > "Buscar imóveis" > "Run workflow"

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rodar a busca
        env:
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: node scripts/buscar.mjs

      - name: Salvar resultado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imoveis.json
          git diff --staged --quiet || git commit -m "Atualiza imoveis.json [automático]"
          git push
