name: Gerenciar Links de Clientes

on:
  workflow_dispatch:
    inputs:
      acao:
        description: 'Ação a executar'
        required: true
        default: 'limpar-expirados'
        type: choice
        options:
          - limpar-expirados
          - listar-ativos

permissions:
  contents: write

jobs:
  gerenciar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Executar script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACAO: ${{ github.event.inputs.acao }}
        run: node scripts/gerenciar-links.js

      - name: Commit changes
        if: github.event.inputs.acao == 'limpar-expirados'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add links.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🗑️ Remove links expirados"
            git push
          else
            echo "Nenhuma alteração para commitar"
          fi
